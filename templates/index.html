<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOT — Screenshot Tool</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <div class="app">

    <!-- ── HEADER ────────────────────────────────────── -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-name">SHOT</span>
        <span class="brand-sep">/</span>
        <span class="brand-sub">Webpage Screenshot Tool</span>
      </div>
      <span id="status" class="status-text" role="status" aria-live="polite"></span>
    </header>

    <!-- ── MAIN WORKSPACE ────────────────────────────── -->
    <div class="workspace">

      <!-- LEFT: Controls -->
      <aside class="controls-panel">
        <form id="captureForm" novalidate>
          <div class="form-body">

            <div class="field field-hero">
              <label for="url" class="field-label">Website URL</label>
              <input
                id="url" name="url" type="url"
                placeholder="https://example.com"
                autocomplete="off"
                spellcheck="false"
                required
              />
            </div>

            <div class="field">
              <label for="filenameTemplate" class="field-label">Save As</label>
              <input id="filenameTemplate" name="filename_template" type="text"
                value="{host}_{date}_{time}.png" spellcheck="false" />
              <p class="field-hint">{host} &middot; {date} &middot; {time}</p>
            </div>

            <div class="field-row">
              <div class="field">
                <label for="width" class="field-label">Width <span class="unit">px</span></label>
                <input id="width" name="width" type="number" min="1" value="1920" required />
              </div>
              <div class="field">
                <label for="height" class="field-label">Height <span class="unit">px</span></label>
                <input id="height" name="height" type="number" min="1" value="1080" required />
              </div>
            </div>

            <div class="preset-grid" aria-label="Common resolutions">
              <button type="button" class="preset-btn" data-w="390" data-h="844">
                <span class="preset-name">Phone</span>
                <span class="preset-size">390×844</span>
              </button>
              <button type="button" class="preset-btn" data-w="768" data-h="1024">
                <span class="preset-name">Tablet</span>
                <span class="preset-size">768×1024</span>
              </button>
              <button type="button" class="preset-btn" data-w="1280" data-h="720">
                <span class="preset-name">HD</span>
                <span class="preset-size">1280×720</span>
              </button>
              <button type="button" class="preset-btn preset-active" data-w="1920" data-h="1080">
                <span class="preset-name">Full HD</span>
                <span class="preset-size">1920×1080</span>
              </button>
              <button type="button" class="preset-btn" data-w="2560" data-h="1440">
                <span class="preset-name">2K</span>
                <span class="preset-size">2560×1440</span>
              </button>
              <button type="button" class="preset-btn" data-w="3840" data-h="2160">
                <span class="preset-name">4K</span>
                <span class="preset-size">3840×2160</span>
              </button>
            </div>

            <div class="field">
              <label class="field-label">Image Quality</label>
              <div class="seg-control" id="sharpnessControl" role="group" aria-label="Image quality level">
                <button type="button" class="seg-btn" data-value="1">
                  <span class="seg-val">1×</span>
                  <span class="seg-desc">Normal</span>
                </button>
                <button type="button" class="seg-btn seg-active" data-value="2">
                  <span class="seg-val">2×</span>
                  <span class="seg-desc">Sharp</span>
                </button>
                <button type="button" class="seg-btn" data-value="4">
                  <span class="seg-val">4×</span>
                  <span class="seg-desc">Ultra</span>
                </button>
              </div>
              <input type="hidden" id="deviceScale" name="device_scale_factor" value="2" />
              <p class="field-hint">Higher = sharper image, bigger file. 2× is the sweet spot.</p>
            </div>

            <!-- Wait + Open Folder toggle in one compact row -->
            <div class="bottom-row">
              <div class="field field-wait">
                <label for="wait" class="field-label">Wait <span class="unit">sec</span></label>
                <input id="wait" name="wait" type="number" min="0" step="1" value="4" required />
              </div>
              <label class="toggle-standalone" for="openAfterDownload">
                <span class="toggle-wrap">
                  <input id="openAfterDownload" name="open_after_download" type="checkbox" class="toggle-input" />
                  <span class="toggle-track" aria-hidden="true"></span>
                </span>
                <span class="toggle-label">Open folder after saving</span>
              </label>
            </div>

          </div><!-- /.form-body -->

          <div class="form-actions">
            <button class="btn-capture" id="captureBtn" type="submit">
              <span class="capture-icon" aria-hidden="true">◉</span>
              <span class="capture-label">Take Screenshot</span>
            </button>
          </div>

        </form>
      </aside>

      <!-- RIGHT: Preview -->
      <main class="preview-panel" id="previewPanel">
        <div class="preview-viewport" id="previewViewport">
          <div id="previewPlaceholder" class="preview-empty">
            <div class="empty-reticle" aria-hidden="true">
              <div class="reticle-ring"></div>
              <div class="reticle-cross-h"></div>
              <div class="reticle-cross-v"></div>
            </div>
            <p class="empty-title">No screenshot yet</p>
            <p class="empty-hint">Enter a URL on the left and hit Take Screenshot</p>
          </div>
          <img id="previewImage" alt="Screenshot preview" />
        </div>

        <footer class="preview-footer">
          <span id="previewFilename" class="preview-fname" title=""></span>
          <div class="preview-btns">
            <button class="btn btn-download" id="downloadBtn" type="button" disabled>
              ⬇ Download
            </button>
            <button class="btn btn-folder" id="openFolderBtn" type="button">
              📁 Folder
            </button>
          </div>
        </footer>
      </main>

    </div><!-- /.workspace -->

    <!-- ── FILMSTRIP — slides in after first capture ─── -->
    <section class="filmstrip" id="filmstripSection" aria-label="Capture history">
      <div class="filmstrip-header">
        <span class="filmstrip-label">HISTORY</span>
        <span class="filmstrip-hint" id="filmstripHint">No captures yet</span>
      </div>
      <div id="historyList" class="filmstrip-track" role="list"></div>
    </section>

  </div><!-- /.app -->

  <script src="/static/app.js"></script>
</body>
</html>
